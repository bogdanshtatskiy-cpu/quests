<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Вход в редактор</h2>
            <input type="password" id="auth-key" placeholder="Секретный ключ...">
            <button id="btn-login">Войти</button>
            <button id="btn-guest">Режим просмотра</button>
        </div>
    </div>

    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>Ветки квестов</h3>
                <button id="btn-add-mod" class="admin-only">+</button>
            </div>
            <ul id="mod-list"></ul>
        </aside>

        <main id="canvas-container">
            <div id="quest-canvas">
                <svg id="connections-layer"></svg>
                <div id="nodes-layer"></div>
            </div>
            
            <div class="canvas-controls">
                <span>ЛКМ - Таскать холст/квесты | ПКМ - Добавить квест | Shift+Клик - Соединить</span>
            </div>
            
            <button id="btn-save-cloud" class="admin-only save-btn">💾 Сохранить изменения</button>
        </main>
    </div>

    <div id="node-context-menu" class="context-menu hidden">
        <div class="menu-item" id="menu-edit">Редактировать</div>
        <div class="menu-item" id="menu-link">Соединить (Shift+Клик)</div>
        <div class="menu-item delete" id="menu-delete">Удалить</div>
    </div>

    <div id="add-mod-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Добавить ветку квестов</h2>
            <input type="text" id="new-mod-name" placeholder="Название (например: IC2)">
            <div class="item-selection">
                <h3>Иконка для вкладки</h3>
                <input type="text" id="mod-icon-search" placeholder="Поиск по базе...">
                <div id="mod-icon-results" class="search-results-list"></div>
                <div id="mod-icon-preview"></div>
            </div>
            <button id="btn-save-mod">Добавить</button>
            <button id="btn-close-mod" class="btn-cancel">Отмена</button>
        </div>
    </div>

    <div id="quest-edit-modal" class="modal hidden">
        <div class="modal-content large">
            <h2>Настройки квеста</h2>
            <input type="text" id="quest-title" placeholder="Название квеста">
            <textarea id="quest-desc" placeholder="Описание задания..."></textarea>
            
            <div class="item-selection">
                <h3>Иконка / Требуемый предмет</h3>
                <input type="text" id="item-search" placeholder="Поиск по базе...">
                <div id="search-results" class="search-results-list"></div>
                <div id="selected-item-preview"></div>
                <input type="text" id="custom-item-name" placeholder="Свое название предмета (необязательно)">
            </div>

            <button id="btn-save-quest">Сохранить</button>
            <button id="btn-close-quest" class="btn-cancel">Отмена</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
