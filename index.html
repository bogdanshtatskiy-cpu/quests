<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Quest Editor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="show-titles">

    <div id="top-bar" class="mc-panel ui-element">
        <button id="btn-toggle-titles" class="mc-button">Скрыть названия</button>
        <div class="controls-hint">Перемещение: ЛКМ | Настройки: ПКМ | Связать: Shift+ЛКМ</div>
    </div>

    <div id="node-context-menu" class="mc-panel context-menu hidden">
        <div class="menu-item" id="menu-edit">Редактировать</div>
        <div class="menu-item" id="menu-link">Соединить (Shift+ЛКМ)</div>
        <div class="menu-item delete" id="menu-delete">Удалить</div>
    </div>

    <div id="app-container">
        <aside id="sidebar" class="mc-panel ui-element">
            <div class="sidebar-header">
                <h3>Ветки квестов</h3>
                <button id="btn-add-mod" class="mc-button">+</button>
            </div>
            <ul id="mod-list"></ul>
        </aside>

        <main id="canvas-container">
            <div id="quest-canvas">
                <svg id="connections-layer"></svg>
                <div id="nodes-layer"></div>
            </div>
            <button id="btn-save-cloud" class="mc-button ui-element save-btn">💾 Сохранить</button>
        </main>
    </div>

    <div id="quest-tooltip" class="mc-panel hidden ui-element">
        <h3 id="tt-title"></h3>
        <div id="tt-desc"></div>
        <div class="tt-section" id="tt-reqs-container">
            <span class="tt-label">Требуется:</span>
            <div id="tt-reqs"></div>
        </div>
        <div class="tt-section" id="tt-rewards-container">
            <span class="tt-label">Награда:</span>
            <div id="tt-rewards"></div>
        </div>
    </div>

    <div id="add-mod-modal" class="modal hidden">
        <div class="mc-panel modal-content">
            <h2 id="mod-modal-title" class="mc-title">Настройки ветки</h2>
            <div class="form-group">
                <label>Название ветки:</label>
                <input type="text" id="new-mod-name" class="mc-input" placeholder="Например: IC2">
            </div>
            <div class="form-group">
                <label>Иконка ветки:</label>
                <button id="btn-select-mod-icon" class="mc-button">Выбрать иконку</button>
                <div id="mod-icon-preview" class="preview-box"></div>
            </div>
            <div class="modal-actions">
                <button id="btn-save-mod" class="mc-button">Сохранить</button>
                <button id="btn-close-mod" class="mc-button btn-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <div id="quest-edit-modal" class="modal hidden">
        <div class="mc-panel modal-content large">
            <h2 class="mc-title">Настройки квеста</h2>
            <div class="form-group">
                <label>Название квеста:</label>
                <input type="text" id="quest-title" class="mc-input">
            </div>
            
            <div class="form-row">
                <div class="form-group half">
                    <label>Требования (Условия):</label>
                    <div id="reqs-list" class="item-list-container"></div>
                    <button id="btn-add-req" class="mc-button mt-5">+ Добавить условие</button>
                </div>
                <div class="form-group half">
                    <label>Награды:</label>
                    <div id="rewards-list" class="item-list-container"></div>
                    <button id="btn-add-reward" class="mc-button mt-5">+ Добавить награду</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Описание задания:</label>
                <textarea id="quest-desc" class="mc-input"></textarea>
            </div>
            
            <div class="modal-actions">
                <button id="btn-save-quest" class="mc-button">Сохранить</button>
                <button id="btn-delete-quest" class="mc-button danger">Удалить квест</button>
                <button id="btn-close-quest" class="mc-button btn-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <div id="item-picker-modal" class="modal hidden">
        <div class="mc-panel modal-content large">
            <h2 class="mc-title">Выбор предмета</h2>
            <div class="picker-controls">
                <select id="picker-mod-filter" class="mc-input"></select>
                <input type="text" id="picker-search" class="mc-input" placeholder="Поиск по названию или ID...">
                <label class="mc-checkbox"><input type="checkbox" id="picker-fav-only"> Только избранное (★)</label>
            </div>
            <div id="picker-results" class="search-results-list"></div>
            <div class="modal-actions">
                <button id="btn-picker-cancel" class="mc-button btn-cancel">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
