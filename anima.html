<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Texture Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="app-layout">
        <div id="left-panel" class="panel">
            <h3>Файлы</h3>
            <label class="btn action-btn">Загрузить файлы<input type="file" id="file-input" multiple accept=".png,.mcmeta,.json" style="display:none;"></label>
            <div id="file-list"></div>
        </div>

        <div id="center-panel">
            <div id="view-3d-container">
                <canvas id="webgl-canvas"></canvas>
            </div>
            <div id="resizer"></div>
            <div id="view-2d-container">
                <div id="toolbar">
                    <div class="tool-group">
                        <button id="tool-pencil" class="btn tool-btn active">✏️</button>
                        <button id="tool-picker" class="btn tool-btn">💧</button>
                    </div>
                    <div class="tool-group">
                        <input type="color" id="draw-color" value="#ffffff">
                        <select id="brush-size">
                            <option value="1" selected>1px</option>
                            <option value="2">2px</option>
                            <option value="4">4px</option>
                            <option value="8">8px</option>
                            <option value="16">16px</option>
                        </select>
                    </div>
                    <div class="tool-group">
                        <button id="btn-undo" class="btn tool-btn" title="Отменить">↩️</button>
                        <button id="btn-redo" class="btn tool-btn" title="Повторить">↪️</button>
                    </div>
                    <div class="tool-group">
                        <button id="btn-copy-frame" class="btn tool-btn" title="Копировать кадр">📄 Копия кадра</button>
                        <button id="btn-clear-frame" class="btn tool-btn" title="Очистить кадр">🗑️ Очистить</button>
                    </div>
                </div>
                
                <div id="editor-workspace">
                    <div id="canvas-wrapper">
                        <canvas id="draw-canvas"></canvas>
                        <div id="brush-cursor"></div>
                    </div>
                </div>
                
                <div id="frames-container"></div>
            </div>
        </div>

        <div id="right-panel" class="panel">
            <h3>Настройки</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">Фон 3D: <input type="color" id="bg-color-3d" value="#181818"></div>
            <button id="btn-dl-all" class="btn success-btn">Скачать всё (.zip)</button>
            <button id="btn-dl-current" class="btn action-btn" style="margin-top:5px;">Скачать текущий</button>
            <hr>
            <h3>Код .mcmeta</h3>
            <textarea id="json-editor" disabled></textarea>
            <button id="btn-apply-json" class="btn action-btn" disabled>Применить код</button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
